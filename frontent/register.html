<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center mb-3">Register</h3>

    <form id="form">
      <input type="number" id="user_id" class="form-control mb-3" placeholder="Enter User ID" required>
      <button class="btn btn-primary w-100">Submit</button>
    </form>

    <p id="msg" class="mt-3 text-center"></p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const event_id = params.get("event_id");

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const user_id = document.getElementById("user_id").value;

  fetch("https://ingenious-gentleness-production-7add.up.railway.app/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id, event_id })
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("msg").innerText = data;
  });
});
</script>

</body>
</html>
