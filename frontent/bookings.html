<!DOCTYPE html>

<html>
<head>
  <title>My Bookings</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(
        rgba(0,0,0,0.7),
        rgba(0,0,0,0.85)
      ),
      url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      color: white;
      min-height: 100vh;
    }

    .btn{
        border-radius: 30px;
    }

    .navbar {
      background: rgba(0,0,0,0.8) !important;
      backdrop-filter: blur(8px);
    }

    .title {
      font-weight: 600;
      letter-spacing: 1px;
    }

    .card-custom {
      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      transition: 0.3s;
      height: 100%;
    }

    .card-custom:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .event-title {
      font-weight: 600;
      font-size: 18px;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      color: #ccc;
    }
  </style>

</head>

<body>

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand fw-bold">Celebria</span>
  <div id="nav-auth"></div>
</nav>

<div class="container mt-4">
  <h2 class="text-center mb-4 title">My Booked Events</h2>

  <div id="bookings" class="row g-4"></div>
</div>

<script>
// 🔐 Protect
if(!localStorage.getItem("user")){
  window.location.href = "login.html";
}

const user = JSON.parse(localStorage.getItem("user"));

// Navbar
document.getElementById("nav-auth").innerHTML = `
  <a href="events.html" class="btn btn-outline-light btn-sm me-2">Events</a>
  <span class="text-white me-3 fw-semibold">${user.Name || user.name}</span>
  <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
`;

function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

// 🔥 FETCH FROM DB
fetch(`http://127.0.0.1:5000/my-bookings/${user.User_id}`)
  .then(res => res.json())
  .then(data => {

    let bookings = data || [];

    // 🔥 ALSO ADD LAST EVENT (INSTANT SHOW)
    const lastEvent = JSON.parse(localStorage.getItem("lastEvent"));
    if(lastEvent){
      bookings.unshift({
        Event_name: lastEvent.name,
        Event_date: lastEvent.date,
        Event_time: lastEvent.time,
        Request: lastEvent.request
      });
    }

    if(!bookings.length){
      document.getElementById("bookings").innerHTML =
        "<p class='empty'>No events booked yet</p>";
      return;
    }

    let output = "";

    bookings.forEach(event => {
      output += `
        <div class="col-md-4">
          <div class="card-custom">
            <h5 class="event-title">${event.Event_name || "No Title"}</h5>
            <p>${event.Request || ""}</p>
            <p>📅 ${event.Event_date?.split("T")[0] || event.Event_date}</p>
            <p>⏰ ${event.Event_time}</p>
          </div>
        </div>
      `;
    });

    document.getElementById("bookings").innerHTML = output;
  })
  .catch(err => {
    console.log(err);
    document.getElementById("bookings").innerHTML =
      "<p class='empty'>Error loading bookings</p>";
  });
</script>

</body>
</html>
