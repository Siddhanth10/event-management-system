<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;

      background: url('https://plus.unsplash.com/premium_photo-1770249684623-6497ef12a117?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjF8fHBhcnR5JTIwZnJlZSUyMGltYWdlc3xlbnwwfHwwfHx8MA%3D%3D') center/cover no-repeat;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
    }

    /* Card */
    .signup-card {
      width: 400px;
      padding: 40px;
      border-radius: 20px;

      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);

      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      color: white;

      position: relative;
      z-index: 2;
    }

    h3 {
      font-family: 'Playfair Display', serif;
    }

    /* Inputs */
    .form-control {
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 500;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .form-control:focus {
      background: rgba(255,255,255,0.2);
      color: white;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
    }

    /* Autofill fix */
    input:-webkit-autofill {
      -webkit-text-fill-color: white !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    /* Button */
    .btn-signup {
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn-signup:hover {
      transform: scale(1.05);
    }

    /* Links */
    .link {
      color: #ddd;
      text-decoration: none;
    }

    .link:hover {
      color: white;
    }
  </style>
</head>

<body>

<div class="signup-card text-center">

  <h3 class="mb-4">Create Account</h3>

  <form id="signupForm">

    <input type="text" id="name" class="form-control mb-3" placeholder="Full Name" required>
    <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

    <button class="btn btn-light w-100 btn-signup">Sign Up</button>

  </form>

  <p id="msg" class="mt-3 text-warning"></p>

  <p class="mt-3">
    Already have an account?
    <a href="login.html" class="link">Login</a>
  </p>

</div>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "⏳ Creating account...";

  fetch("https://ingenious-gentleness-production-7add.up.railway.app/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email, password })
  })
  .then(res => res.json())
  .then(data => {

    if(data.success){
      msg.innerText = "✅ Account created! Redirecting...";
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    } else {
      msg.innerText = data.message || "❌ Signup failed";
    }

  })
  .catch(() => {
    msg.innerText = "⚠️ Server error";
  });
});
</script>

</body>
</html>
