<!DOCTYPE html>
<html>
<head>
  <title>Payment Receipt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 🎉 Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body{
        background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    }

    .card{
        background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      color: white;
    }
  </style>
</head>

<body style="background:#f5f7fa;">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class ="box">

  <div class="card p-4 shadow text-center" style="width: 420px; border-radius:15px;">

    <h4 class=" mb-3" style="color: #00ffcc;">🎉 Payment Successful</h4>

    <div id="details" class="text-start"></div>

    <button class="btn btn-primary w-100 mt-3" onclick="goHome()">
      Go to Bookings
    </button>

  </div>
    </div>
</div>

<script>
// ✅ Use sessionStorage (temporary)
const data = JSON.parse(sessionStorage.getItem("receipt"));

// ✅ Safety check
if(!data){
  document.getElementById("details").innerHTML =
    "<p>No receipt data found</p>";
} else {
  document.getElementById("details").innerHTML = `
    <p><strong>Event:</strong> ${data.name}</p>
    <p><strong>Date:</strong> ${data.date}</p>
    <p><strong>Time:</strong> ${data.time}</p>
    <p><strong>Amount:</strong> Undisclosed</p>
    <p><strong>Method:</strong> ${data.method}</p>
    <p><strong>Transaction ID:</strong> ${data.txn}</p>
  `;
}

// 🎉 CONFETTI FUNCTION
function launchConfetti() {
  const duration = 2 * 1000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 70,
      origin: { x: 0 }
    });

    confetti({
      particleCount: 5,
      angle: 120,
      spread: 70,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

// 🎉 Trigger
launchConfetti();

// 🔥 OPTIONAL: clear after showing
setTimeout(() => {
  sessionStorage.removeItem("receipt");
}, 3000);

// Redirect
function goHome(){
  window.location.href = "bookings.html";
}
</script>

</body>
</html>
