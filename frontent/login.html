<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
        body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;

      /* 🔥 PREMIUM BACKGROUND IMAGE */
      background: url('https://images.unsplash.com/photo-1676113462184-ccbf85282eed?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover no-repeat;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 🔥 DARK OVERLAY FOR CONTRAST */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
    }

    /* 🔥 LOGIN CARD (MATCHES BG) */
    .login-card {
      width: 380px;
      padding: 40px;
      border-radius: 20px;

      background: rgba(0,0,0,0.55); /* 🔥 darker glass */
      backdrop-filter: blur(12px);

      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      color: white;

      position: relative;
      z-index: 2;
    }

    h3 {
      font-family: 'Playfair Display', serif;
    }

    /* Inputs */
    .form-control {
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .form-control::placeholder {
      color: #ccc;
    }

    .form-control:focus {
      box-shadow: none;
      background: rgba(255,255,255,0.15);
    }

    /* Button */
    .btn-login {
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn-login:hover {
      transform: scale(1.05);
    }

    /* Links */
    .link {
      color: #ddd;
    }

    .link:hover {
      color: white;
    }

    .form-control {
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.12);
      
      color: #ffffff;              /* 🔥 typed text visible */
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Placeholder */
    .form-control::placeholder {
      color: rgba(255,255,255,0.6);
    }

    /* Focus state */
    .form-control:focus {
      background: rgba(255,255,255,0.2);
      color: #ffffff;
      outline: none;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<div class="login-card text-center">

  <h3 class="mb-4">Welcome Back</h3>

  <form id="loginForm">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

    <button class="btn btn-light w-100 btn-login">Login</button>
  </form>

  <p id="msg" class="mt-3 text-warning"></p>

  <p class="mt-3">
    Don’t have an account?
    <a href="signup.html" class="link">Sign Up</a>
  </p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "⏳ Logging in...";

  fetch("https://ingenious-gentleness-production-7add.up.railway.app/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {

    if(data.success){
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = "events.html";
    } else {
      msg.innerText = "❌ Invalid credentials";
    }

  })
  .catch(() => {
    msg.innerText = "⚠️ Server error";
  });
});
</script>

</body>
</html>
